<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>ElektroPlan V10.2</title>
<style>
*{box-sizing:border-box}
body{margin:0;background:#f4f6f9;color:#111827;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif}
.app{display:grid;grid-template-columns:310px 1fr;min-height:100vh}
.sidebar{background:#fff;border-right:1px solid #e5e7eb;padding:14px;overflow:auto}
.main{padding:14px 18px 90px}
h1{font-size:25px;margin:4px 0 14px}.ver{font-size:13px;background:#eef2f7;border-radius:999px;padding:4px 8px;margin-left:6px}
h2{margin:8px 0 12px}.muted{color:#667085;font-size:13px}.sectionTitle{font-weight:900;color:#475467;font-size:13px;margin:18px 0 8px;text-transform:uppercase}
.card{background:#fff;border:1px solid #e5e7eb;border-radius:16px;padding:14px;margin:12px 0;box-shadow:0 4px 16px rgba(16,24,40,.06)}
input,select,button{width:100%;font-size:15px;padding:11px;border-radius:12px;border:1px solid #cfd4dc;background:#fff}
label{display:block;font-weight:800;margin:10px 0 6px}
button{border:0;background:#007aff;color:#fff;font-weight:900;margin-top:8px;cursor:pointer}
button.secondary{background:#e8edf3;color:#101828}
button.danger{background:#ef4444}.green{background:#16a34a}
.topbar{display:flex;justify-content:space-between;gap:12px;background:#fff;border-bottom:1px solid #e5e7eb;margin:-14px -18px 14px;padding:12px 18px;position:sticky;top:0;z-index:5}
.tabs{display:flex;gap:10px;border-bottom:1px solid #e5e7eb;margin-bottom:12px;overflow:auto}
.tabs button{width:auto;background:transparent;color:#344054;border-radius:0;border-bottom:3px solid transparent;padding:13px 18px;margin:0}
.tabs button.active{color:#007aff;border-bottom-color:#007aff}
.hidden{display:none!important}.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.checks{display:grid;grid-template-columns:1fr 1fr;gap:8px}.check{display:flex;gap:8px;align-items:center;background:#f8fafc;border:1px solid #e5e7eb;border-radius:12px;padding:10px;font-weight:800}.check input{width:auto}
.item{border:1px solid #e5e7eb;background:#fbfcfe;border-radius:14px;padding:12px;margin:9px 0}.row{display:flex;justify-content:space-between;gap:10px;align-items:flex-start}
.name{font-weight:900;font-size:17px}.pill{display:inline-block;background:#eaf4ff;color:#075985;border-radius:999px;padding:4px 9px;margin:4px 4px 0 0;font-size:12px;font-weight:800}
.nav{border-radius:12px;padding:9px;margin:4px 0;cursor:pointer}.nav:hover,.nav.active{background:#eaf3ff;color:#0066e6;font-weight:900}.nav small{display:block;color:#667085;font-weight:500}.indent1{margin-left:12px}.indent2{margin-left:28px}
.badge{float:right;background:#f2f4f7;border:1px solid #e5e7eb;border-radius:999px;padding:2px 8px;color:#475467;font-size:12px}.free{color:#16a34a;font-weight:900}.used{color:#dc2626;font-weight:900}
table{width:100%;border-collapse:collapse;font-size:13px}td,th{border-bottom:1px solid #e5e7eb;padding:7px;text-align:left;vertical-align:top}
.notice{background:#fff7ed;color:#9a3412;border-radius:12px;padding:11px;font-size:13px;line-height:1.4}.ok{background:#ecfdf3;color:#166534;border-radius:12px;padding:11px;font-size:13px}
.wire{display:flex;align-items:center;gap:8px;margin:6px 0}.dot{width:18px;height:18px;border-radius:50%;border:1px solid #333}.brown{background:#7b3f00}.blue{background:#0074d9}.black{background:#111}.grey{background:#999}.orange{background:#f59e0b}.yellowgreen{background:linear-gradient(90deg,green 50%,yellow 50%)}.purple{background:#7e22ce}
.footer{position:fixed;left:310px;right:0;bottom:0;background:#fff;border-top:1px solid #e5e7eb;padding:9px 18px;display:flex;gap:28px;font-size:13px}.fab{display:none}
@media(max-width:760px){body{font-size:17px}.app{display:block}.sidebar{display:block;border-right:0;border-bottom:1px solid #e5e7eb;max-height:330px}.main{padding:10px 10px 96px}.topbar{margin:-10px -10px 10px;padding:10px;display:block}.topbar select{width:100%!important;margin-top:8px}.tabs{gap:4px;position:sticky;top:0;background:#f4f6f9;z-index:4;padding-top:6px}.tabs button{font-size:14px;padding:12px 10px}.grid{grid-template-columns:1fr}.footer{left:0;overflow:auto;font-size:12px}.checks{grid-template-columns:1fr}.card{border-radius:18px;padding:14px;margin:10px 0}input,select,button{font-size:17px;min-height:52px}.item{padding:14px}.row{display:block}.row>div[style*="width"]{width:100%!important;display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}.row>div[style*="width"] button{margin-top:0}table{display:block;overflow-x:auto;white-space:nowrap}.fab{display:flex;position:fixed;right:18px;bottom:54px;width:58px;height:58px;border-radius:999px;font-size:32px;align-items:center;justify-content:center;box-shadow:0 10px 26px rgba(0,0,0,.25);z-index:10}}
@media print{.sidebar,.topbar,.tabs,.footer,.noPrint,.fab{display:none!important}.app{display:block}.main{padding:0}.card{box-shadow:none;border:0}}
</style>
</head>
<body>
<div class="app">
<aside class="sidebar">
<h1>⚡ ElektroPlan <span class="ver">V10.2</span></h1>
<div class="sectionTitle">Projekt</div>
<div id="treeProject"></div>
<button onclick="newProject()">+ Projekt</button>
<div class="sectionTitle">Geführter Projektbaum</div>
<div id="tree"></div>
<div class="sectionTitle">Nächster Schritt</div>
<div id="guideBox" class="notice"></div>
</aside>

<main class="main">
<div class="topbar">
  <div><b>Projekt:</b> <select id="projectSelect" onchange="openProject(this.value)" style="width:220px;display:inline-block"></select> <span class="muted">Version 10.2</span></div>
  <div style="display:flex;gap:8px"><button class="secondary" onclick="exportProject()" style="width:auto">Export</button><button class="secondary" onclick="document.getElementById('importFile').click()" style="width:auto">Import</button><button onclick="window.print()" style="width:auto">PDF/Drucken</button><input id="importFile" class="hidden" type="file" accept=".json" onchange="importProject(event)"></div>
</div>

<div class="tabs">
<button id="bEdit" onclick="show('Edit')">Eingabe</button>
<button id="bCalc" onclick="show('Calc')">Berechnung</button>
<button id="bKlemmen" onclick="show('Klemmen')">Klemmen</button>
<button id="bMaterial" onclick="show('Material')">Material</button>
</div>

<section id="tabEdit">
 <div class="card">
  <h2 id="editTitle">Projekt</h2>
  <div id="editHelp" class="ok"></div>
  <div id="editContent"></div>
 </div>
</section>

<section id="tabCalc" class="hidden">
 <div class="card"><h2>Abschnittsberechnung je Schlauch</h2><div id="calcList"></div></div>
</section>

<section id="tabKlemmen" class="hidden">
 <div class="card"><h2>Reihenklemmen</h2><div class="notice">L direkt auf Automat, N direkt am 1P+N-Automaten, PE auf PE-Schiene. Reihenklemmen nur für geschaltete Leiter.</div><div id="klemmenList"></div></div>
</section>

<section id="tabMaterial" class="hidden">
 <div class="card"><h2>Material</h2><div id="materialList"></div></div>
 <div class="card noPrint"><button class="secondary" onclick="clearProject()">Aktuelles Projekt leeren</button><button class="danger" onclick="deleteProject()">Aktuelles Projekt löschen</button><button class="danger" onclick="resetAll()">Alle lokalen Daten löschen</button></div>
</section>
</main>
</div>
<button class="fab" onclick="selectAddDose()">+</button>
<div class="footer"><span>✅ Automatisch gespeichert</span><span id="footerStats"></span></div>

<script>
const KEY="elektroplan_v102";
const DEFAULT_ROOMS=["Wohnzimmer","Esszimmer","Küche","Bad","Speise","Vorraum","WC","Schlafzimmer"];
const ROOM_CODES={"Wohnzimmer":"WZ","Esszimmer":"EZ","Küche":"KÜ","Bad":"BA","Speise":"SP","Vorraum":"VR","WC":"WC","Schlafzimmer":"SZ"};
let db=loadDB(), currentId=null, selected={type:"project",room:null,hoseId:null,doseId:null}, activeTab="Edit";

function uid(){return"p"+Date.now()+"_"+Math.floor(Math.random()*9999)}
function hid(){return"h"+Date.now()+"_"+Math.floor(Math.random()*9999)}
function did(){return"d"+Date.now()+"_"+Math.floor(Math.random()*9999)}
function freshProject(name){let h={id:hid(),room:"Wohnzimmer",name:"Schlauch 1",fxp:"20",cross:"1,5"};return{id:uid(),name:name||"Neues Projekt",rooms:[...DEFAULT_ROOMS],hoses:[h],doses:[],lightGroups:["Lichtkreis 1"]}}
function loadDB(){try{return JSON.parse(localStorage.getItem(KEY))||{currentId:null,projects:[]}}catch{return{currentId:null,projects:[]}}}
function store(){db.currentId=currentId;localStorage.setItem(KEY,JSON.stringify(db));renderAll()}
function current(){return db.projects.find(p=>p.id===currentId)}
function migrate(p){if(!p.rooms)p.rooms=[...DEFAULT_ROOMS];if(!p.hoses)p.hoses=[];if(!p.doses)p.doses=[];if(!p.lightGroups)p.lightGroups=["Lichtkreis 1"];if(!p.hoses.length)p.hoses.push({id:hid(),room:p.rooms[0]||"Wohnzimmer",name:"Schlauch 1",fxp:"20",cross:"1,5"});p.hoses.forEach(h=>{if(!h.id)h.id=hid();if(!h.fxp)h.fxp="20";if(!h.cross)h.cross="1,5"});p.doses.forEach(d=>{if(!d.id)d.id=did();if(!d.hoseId){let h=p.hoses.find(x=>x.room===d.room)||p.hoses[0];d.hoseId=h.id;d.room=h.room}})}
function ensure(){if(!db.projects.length)db.projects.push(freshProject("Neues Projekt"));currentId=db.currentId||db.projects[0].id;db.projects.forEach(migrate)}
function esc(s){return String(s??"").replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#039;"}[m]))}
function roomCode(r){return ROOM_CODES[r]||r.substring(0,2).toUpperCase()}
function hosesInRoom(p,r){return p.hoses.filter(h=>h.room===r).sort((a,b)=>num(a.name)-num(b.name))}
function num(s){let m=String(s).match(/\d+/);return m?parseInt(m[0]):9999}
function dosesInHose(p,hid){return p.doses.filter(d=>d.hoseId===hid)}
function nextDoseName(room){let p=current(),c=roomCode(room),max=0;p.doses.forEach(d=>{if(d.room===room&&d.name?.startsWith(c)){let n=parseInt(d.name.replace(c,""));if(!isNaN(n)&&n>max)max=n}});return c+String(max+1).padStart(2,"0")}
function show(t){["Edit","Calc","Klemmen","Material"].forEach(x=>{document.getElementById("tab"+x).classList.add("hidden");document.getElementById("b"+x).classList.remove("active")});activeTab=t;document.getElementById("tab"+t).classList.remove("hidden");document.getElementById("b"+t).classList.add("active");renderAll()}
function choose(type,room=null,hoseId=null,doseId=null){selected={type,room,hoseId,doseId};show("Edit")}
function openProject(id){currentId=id;selected={type:"project",room:null,hoseId:null,doseId:null};store()}
function newProject(){let p=freshProject("Neues Projekt");db.projects.push(p);currentId=p.id;choose("project")}
function deleteProject(){if(!confirm("Projekt löschen?"))return;db.projects=db.projects.filter(p=>p.id!==currentId);if(!db.projects.length)db.projects.push(freshProject("Neues Projekt"));currentId=db.projects[0].id;choose("project")}
function clearProject(){let p=current();if(!confirm("Alle Dosen und Schläuche leeren?"))return;p.doses=[];p.hoses=[{id:hid(),room:p.rooms[0]||"Wohnzimmer",name:"Schlauch 1",fxp:"20",cross:"1,5"}];choose("project")}
function resetAll(){if(!confirm("Alle lokalen Daten löschen?"))return;localStorage.removeItem(KEY);db={currentId:null,projects:[]};ensure();choose("project")}
function exportProject(){let p=current();let blob=new Blob([JSON.stringify(p,null,2)],{type:"application/json"});let a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download=(p.name||"elektroplan")+".json";a.click();URL.revokeObjectURL(a.href)}
function importProject(ev){let f=ev.target.files[0];if(!f)return;let r=new FileReader();r.onload=()=>{let p=JSON.parse(r.result);p.id=uid();migrate(p);db.projects.push(p);currentId=p.id;choose("project")};r.readAsText(f)}
function addRoom(name){let p=current(),r=(name||document.getElementById("newRoomName")?.value||"").trim();if(!r)return alert("Raumname fehlt");if(!p.rooms.includes(r))p.rooms.push(r);let h=hosesInRoom(p,r)[0]||addHose(r,false);choose("hose",r,h.id)}
function addHose(room=selected.room,render=true){let p=current();let nr=hosesInRoom(p,room).length+1;let h={id:hid(),room,name:"Schlauch "+nr,fxp:"20",cross:"1,5"};p.hoses.push(h);if(render)choose("hose",room,h.id);return h}
function selectAddDose(){let p=current();let h=selected.hoseId?p.hoses.find(x=>x.id===selected.hoseId):p.hoses[0];if(!h){h=addHose(p.rooms[0],false)}choose("addDose",h.room,h.id,null)}
function saveProjectForm(){let p=current();p.name=document.getElementById("projectName").value.trim()||"Neues Projekt";store()}
function saveHoseForm(id){let p=current(),h=p.hoses.find(x=>x.id===id);h.name=hoseName.value.trim()||h.name;h.fxp=hoseFxp.value;h.cross=hoseCross.value;store()}
function deleteHose(id){let p=current();if(p.doses.some(d=>d.hoseId===id))return alert("Schlauch enthält Dosen.");if(!confirm("Schlauch löschen?"))return;p.hoses=p.hoses.filter(h=>h.id!==id);choose("project")}
function saveDoseForm(existingId=null){let p=current(),h=p.hoses.find(x=>x.id===doseHose.value);let devices=Array.from(document.querySelectorAll("#deviceChecks input:checked")).map(x=>x.value);if(!devices.length)return alert("Bitte Gerät auswählen");let lg=resolveLightGroup();let d={id:existingId||did(),room:h.room,hoseId:h.id,name:doseName.value.trim()||nextDoseName(h.room),type:doseType.value,devices,lightGroup:usesLight(devices)?lg:""};if(existingId){let i=p.doses.findIndex(x=>x.id===existingId);p.doses[i]=d}else p.doses.push(d);choose("hose",h.room,h.id)}
function deleteDose(id){let p=current();if(!confirm("Dose löschen?"))return;p.doses=p.doses.filter(d=>d.id!==id);choose("project")}
function moveDose(id,dir){let p=current(),i=p.doses.findIndex(d=>d.id===id),j=i+dir;if(i<0||j<0||j>=p.doses.length)return;[p.doses[i],p.doses[j]]=[p.doses[j],p.doses[i]];store()}

function usesLight(devices){
  return devices.some(v=>["Schalter","Serienschalter","Wechselschalter","Kreuzschalter","Lampe"].includes(v));
}
function lightGroupOptions(selectedGroup=""){
  let p=current();
  return (p.lightGroups||[]).map(g=>`<option ${g===selectedGroup?"selected":""}>${esc(g)}</option>`).join("") + `<option value="__new__">+ Neuer Lichtkreis...</option>`;
}
function lightGroupField(d=null){
  return `<div class="grid">
    <div>
      <label>Lichtkreis / Schaltgruppe</label>
      <select id="lightGroupSelect" onchange="toggleNewLightGroup()">${lightGroupOptions(d?.lightGroup||"")}</select>
    </div>
    <div>
      <label>Neuer Lichtkreis</label>
      <input id="newLightGroup" placeholder="z. B. Bad Licht" class="${d?.lightGroup?'hidden':''}">
    </div>
  </div>`;
}
function toggleNewLightGroup(){
  const s=document.getElementById("lightGroupSelect"), n=document.getElementById("newLightGroup");
  if(!s||!n)return;
  n.classList.toggle("hidden", s.value!=="__new__");
}
function resolveLightGroup(){
  const s=document.getElementById("lightGroupSelect"), n=document.getElementById("newLightGroup");
  if(!s)return "";
  let p=current(), g=s.value;
  if(g==="__new__")g=(n.value||"").trim();
  if(g && !p.lightGroups.includes(g))p.lightGroups.push(g);
  return g;
}
function deviceChecks(dev=[]){let vals=["Steckdose","Steckdose 2","Schalter","Serienschalter","Wechselschalter","Kreuzschalter","Lampe","Netzwerkdose","Herdanschluss","Geschirrspüler"];return `<div class="checks" id="deviceChecks">`+vals.map(v=>`<label class="check"><input type="checkbox" value="${v}" ${dev.includes(v)?"checked":""}>${v}${v==="Herdanschluss"?" 5×2,5":v==="Geschirrspüler"?" 3×2,5":""}</label>`).join("")+`</div>`}
function has(d,x){return d.devices.includes(x)} function socketCount(d){return(has(d,"Steckdose")?1:0)+(has(d,"Steckdose 2")?1:0)} function hasSocket(d){return socketCount(d)>0} function hasNetwork(d){return has(d,"Netzwerkdose")||d.type==="Netzwerkdose"} function hasHerd(d){return has(d,"Herdanschluss")} function hasGeschirr(d){return has(d,"Geschirrspüler")}
function calcForDoses(doses){let res=doses.map(()=>new Set());let socketEnd=-1;doses.forEach((d,i)=>{if(hasSocket(d))socketEnd=i});for(let i=0;i<=socketEnd;i++){res[i].add("L Steckdose");res[i].add("N Steckdose");res[i].add("PE")}doses.forEach((d,idx)=>{if(hasNetwork(d))for(let i=0;i<=idx;i++)res[i].add("Netzwerkkabel Cat / Datenleitung");if(hasHerd(d))for(let i=0;i<=idx;i++){res[i].add("Herd L1 2,5");res[i].add("Herd L2 2,5");res[i].add("Herd L3 2,5");res[i].add("Herd N 2,5");res[i].add("Herd PE 2,5")}if(hasGeschirr(d))for(let i=0;i<=idx;i++){res[i].add("Geschirrspüler L 2,5");res[i].add("Geschirrspüler N 2,5");res[i].add("Geschirrspüler PE 2,5")}});doses.forEach((d,idx)=>{
  const g=d.lightGroup?` (${d.lightGroup})`:"";
  if(has(d,"Schalter"))for(let i=0;i<=idx;i++){res[i].add("L Licht"+g);res[i].add("L geschaltet zurück"+g)}
  if(has(d,"Serienschalter"))for(let i=0;i<=idx;i++){res[i].add("L Licht"+g);res[i].add("L1 geschaltet zurück"+g);res[i].add("L2 geschaltet zurück"+g)}
  if(has(d,"Lampe"))for(let i=0;i<=idx;i++){res[i].add("L geschaltet"+g);res[i].add("N Licht"+g);res[i].add("PE")}
});let ws=doses.map((d,i)=>has(d,"Wechselschalter")?i:null).filter(x=>x!==null),ks=doses.map((d,i)=>has(d,"Kreuzschalter")?i:null).filter(x=>x!==null);if(ws.length===1){let last=ws[0];let g=doses[last].lightGroup?` (${doses[last].lightGroup})`:"";for(let i=0;i<=last;i++){res[i].add("L Licht"+g);res[i].add("K1"+g);res[i].add("K2"+g)}}if(ws.length>=2){let first=ws[0],last=ws[ws.length-1];let g=doses[last].lightGroup||doses[first].lightGroup;let gs=g?` (${g})`:"";for(let i=0;i<=last;i++){res[i].add("K1"+gs);res[i].add("K2"+gs);res[i].add("L geschaltet zurück"+gs)}for(let i=0;i<=first;i++)res[i].add("L Licht"+gs)}if(ws.length<2&&ks.length)ks.forEach(idx=>{let g=doses[idx].lightGroup?` (${doses[idx].lightGroup})`:"";for(let i=0;i<=idx;i++){res[i].add("K1"+g);res[i].add("K2"+g)}});return res.map(s=>Array.from(s))}
function calcAll(){let p=current(),out=[];p.hoses.forEach(h=>{let ds=dosesInHose(p,h.id);out.push({hose:h,doses:ds,calc:calcForDoses(ds)})});return out}
function eCount(w){return w.filter(x=>!x.includes("Netzwerk")).length}
function suggest(w,h){let net=w.some(x=>x.includes("Netzwerk")),has25=w.some(x=>x.includes("2,5"));let q=has25?"2,5":(h.cross||"1,5");let base=`${eCount(w)} Einzeldrähte ${q} mm² im FXP ${h.fxp}`;return net?base+" + 1× Netzwerkkabel":base}
function wireColor(w){if(w==="PE"||w.includes("PE"))return"yellowgreen";if(w.includes("N "))return"blue";if(w.includes("Steckdose"))return"brown";if(w.includes("K2"))return"grey";if(w.includes("Netzwerk"))return"purple";return"black"}
function wireHTML(w){return `<div class="wire"><span class="dot ${wireColor(w)}"></span>${esc(w)}</div>`}
function renderTree(){let p=current();projectSelect.innerHTML=db.projects.map(pr=>`<option value="${pr.id}" ${pr.id===p.id?"selected":""}>${esc(pr.name)}</option>`).join("");treeProject.innerHTML=`<div class="nav ${selected.type==="project"?"active":""}" onclick="choose('project')">📁 ${esc(p.name)}<span class="badge">${p.doses.length}</span></div>`;let html="";p.rooms.forEach(r=>{html+=`<div class="nav ${selected.type==="room"&&selected.room===r?"active":""}" onclick="choose('room','${esc(r)}')">🏠 ${esc(r)}<span class="badge">${p.doses.filter(d=>d.room===r).length}</span></div>`;hosesInRoom(p,r).forEach(h=>{html+=`<div class="nav indent1 ${selected.hoseId===h.id?"active":""}" onclick="choose('hose','${esc(r)}','${h.id}')">📦 ${esc(h.name)}<small>FXP ${esc(h.fxp)} · ${esc(h.cross)} mm² · ${dosesInHose(p,h.id).length?dosesInHose(p,h.id).length+" Dosen":"leer"}</small></div>`;dosesInHose(p,h.id).forEach(d=>{html+=`<div class="nav indent2 ${selected.doseId===d.id?"active":""}" onclick="choose('dose','${esc(r)}','${h.id}','${d.id}')">▣ ${esc(d.name)}<small>${esc(d.devices.join(", "))}${d.lightGroup?" · "+esc(d.lightGroup):""}</small></div>`});html+=`<div class="nav indent2" onclick="choose('addDose','${esc(r)}','${h.id}')">➕ Dose hinzufügen</div>`});html+=`<div class="nav indent1" onclick="choose('addHose','${esc(r)}')">➕ Schlauch hinzufügen</div>`});html+=`<div class="nav" onclick="choose('addRoom')">➕ Raum hinzufügen</div>`;tree.innerHTML=html}
function renderEdit(){let p=current(),c=editContent;if(selected.type==="project"){editTitle.textContent="Projekt";editHelp.innerHTML="Schritt 1: Projekt benennen, dann Raum anlegen oder auswählen.";c.innerHTML=`<label>Projektname</label><input id="projectName" value="${esc(p.name)}"><button onclick="saveProjectForm()">Projekt speichern</button><button class="secondary" onclick="choose('addRoom')">+ Raum hinzufügen</button><div class="muted" style="margin-top:12px">Lichtkreise: ${esc((p.lightGroups||[]).join(", "))}</div>`}else if(selected.type==="room"){editTitle.textContent="Raum: "+selected.room;editHelp.innerHTML="Schritt 2: Schlauch im Raum auswählen oder neu anlegen.";c.innerHTML=`<button onclick="choose('addHose','${esc(selected.room)}')">+ Schlauch hinzufügen</button>`}else if(selected.type==="addRoom"){editTitle.textContent="Raum hinzufügen";editHelp.innerHTML="Gib einen Raum ein, danach wird automatisch ein Schlauch vorbereitet.";c.innerHTML=`<label>Raumname</label><input id="newRoomName" placeholder="z. B. Büro"><button onclick="addRoom()">Raum speichern</button>`}else if(selected.type==="addHose"){editTitle.textContent="Schlauch hinzufügen";editHelp.innerHTML="Schritt 3: FXP und Querschnitt auswählen.";c.innerHTML=hoseForm(null,selected.room)}else if(selected.type==="hose"){let h=p.hoses.find(x=>x.id===selected.hoseId);editTitle.textContent=h.room+" · "+h.name;editHelp.innerHTML="Schritt 4: Dose in diesem Schlauch anlegen oder Schlauchdaten ändern.";c.innerHTML=hoseForm(h,h.room)+`<button onclick="choose('addDose','${esc(h.room)}','${h.id}')">+ Dose hinzufügen</button>`}else if(selected.type==="addDose"){let h=p.hoses.find(x=>x.id===selected.hoseId);editTitle.textContent="Dose hinzufügen";editHelp.innerHTML="Geräte anhaken und speichern. Danach kannst du direkt die nächste Dose anlegen.";c.innerHTML=doseForm(null,h)}else if(selected.type==="dose"){let d=p.doses.find(x=>x.id===selected.doseId),h=p.hoses.find(x=>x.id===d.hoseId);editTitle.textContent="Dose bearbeiten: "+d.name;editHelp.innerHTML="Hier kannst du Geräte, Namen oder Schlauch ändern.";c.innerHTML=doseForm(d,h)}}

function hoseChoiceNumber(room){
  const used=new Set(hosesInRoom(current(),room).map(h=>num(h.name)));
  for(let i=1;i<=20;i++)if(!used.has(i))return i;
  return 20;
}
function hoseChoiceOptions(room,selectedNum=0){
  const p=current();
  const hs=hosesInRoom(p,room);
  let out="";
  for(let i=1;i<=20;i++){
    const existing=hs.find(h=>num(h.name)===i);
    const label=existing?`🔴 Schlauch ${i} vorhanden (${dosesInHose(p,existing.id).length} Dosen)`:`🟢 Schlauch ${i} frei`;
    out+=`<option value="${i}" ${i===selectedNum?"selected":""}>${label}</option>`;
  }
  return out;
}
function hoseChoiceChanged(room){
  const p=current();
  const n=parseInt(document.getElementById("hoseChoice").value,10);
  const existing=hosesInRoom(p,room).find(h=>num(h.name)===n);
  const info=document.getElementById("hoseChoiceInfo");
  if(existing){
    info.innerHTML=`<span class="used">✖ Schlauch ${n} ist bereits vorhanden.</span><br>${dosesInHose(p,existing.id).length} Dosen in diesem Schlauch.`;
    document.getElementById("openExistingHoseBtn").classList.remove("hidden");
    document.getElementById("saveHoseBtn").classList.add("hidden");
    document.getElementById("hoseName").value=existing.name;
    document.getElementById("hoseFxp").value=existing.fxp||"20";
    document.getElementById("hoseCross").value=existing.cross||"1,5";
  }else{
    info.innerHTML=`<span class="free">✓ Schlauch ${n} ist frei.</span>`;
    document.getElementById("openExistingHoseBtn").classList.add("hidden");
    document.getElementById("saveHoseBtn").classList.remove("hidden");
    document.getElementById("hoseName").value="Schlauch "+n;
  }
}
function openExistingHose(room){
  const n=parseInt(document.getElementById("hoseChoice").value,10);
  const h=hosesInRoom(current(),room).find(h=>num(h.name)===n);
  if(h)choose("hose",room,h.id);
}
function hoseForm(h,room){
  let isNew=!h;
  let selectedNum=isNew?hoseChoiceNumber(room):num(h.name);
  let name=isNew?("Schlauch "+selectedNum):h.name;
  return `${isNew?`
  <label>Schlauch auswählen</label>
  <select id="hoseChoice" onchange="hoseChoiceChanged('${esc(room)}')">${hoseChoiceOptions(room,selectedNum)}</select>
  <div id="hoseChoiceInfo" class="ok" style="margin-top:8px"><span class="free">✓ Schlauch ${selectedNum} ist frei.</span></div>
  <button id="openExistingHoseBtn" class="secondary hidden" onclick="openExistingHose('${esc(room)}')">Vorhandenen Schlauch öffnen</button>`:""}
  <label>Name</label>
  <input id="hoseName" value="${esc(name)}" ${isNew?"readonly":""}>
  <div class="grid">
    <div><label>FXP</label><select id="hoseFxp">
      <option ${h?.fxp==="16"?"selected":""}>16</option>
      <option ${!h||h.fxp==="20"?"selected":""}>20</option>
      <option ${h?.fxp==="25"?"selected":""}>25</option>
      <option ${h?.fxp==="32"?"selected":""}>32</option>
    </select></div>
    <div><label>Querschnitt</label><select id="hoseCross">
      <option ${!h||h.cross==="1,5"?"selected":""}>1,5</option>
      <option ${h?.cross==="2,5"?"selected":""}>2,5</option>
    </select></div>
  </div>
  <button id="saveHoseBtn" onclick="${isNew?`saveNewHose('${esc(room)}')`:`saveHoseForm('${h.id}')`}">${isNew?"Schlauch speichern":"Schlauch speichern"}</button>
  ${h?`<button class="danger" onclick="deleteHose('${h.id}')">Schlauch löschen</button>`:""}`;
}
function saveNewHose(room){
  const n=parseInt(document.getElementById("hoseChoice")?.value||hoseChoiceNumber(room),10);
  const existing=hosesInRoom(current(),room).find(h=>num(h.name)===n);
  if(existing){choose("hose",room,existing.id);return}
  let h=addHose(room,false);
  h.name="Schlauch "+n;
  h.fxp=hoseFxp.value;
  h.cross=hoseCross.value;
  choose("hose",room,h.id)
}
function doseForm(d,h){let p=current();let hoseOpts=p.hoses.map(x=>`<option value="${x.id}" ${x.id===(d?.hoseId||h.id)?"selected":""}>${esc(x.room)} · ${esc(x.name)} · FXP ${esc(x.fxp)} · ${esc(x.cross)} mm²</option>`).join("");return `<div class="grid"><div><label>Dosenname</label><input id="doseName" value="${esc(d?.name||nextDoseName(h.room))}"></div><div><label>Schlauch</label><select id="doseHose">${hoseOpts}</select></div></div><label>Dosenart</label><select id="doseType"><option>1-fach Dose</option><option>2-fach Dose</option><option>3-fach Dose</option><option>Lampenauslass</option><option>Netzwerkdose</option></select>${lightGroupField(d)}<label>Geräte</label>${deviceChecks(d?.devices||[])}<button onclick="saveDoseForm(${d?`'${d.id}'`:"null"})">Dose speichern</button>${d?`<button class="danger" onclick="deleteDose('${d.id}')">Dose löschen</button>`:""}`}
function renderCalc(){let groups=calcAll();calcList.innerHTML=groups.map(g=>!g.doses.length?"":`<h3>${esc(g.hose.room)} · ${esc(g.hose.name)} · FXP ${esc(g.hose.fxp)} · ${esc(g.hose.cross)} mm²</h3>`+g.calc.map((w,i)=>`<div class="item"><div class="name">${i===0?"Verteiler":esc(g.doses[i-1].name)} → ${esc(g.doses[i].name)}</div><b>${eCount(w)} Einzeldrähte</b>${w.some(x=>x.includes("Netzwerk"))?" + LAN":""}<div class="muted">${suggest(w,g.hose)}</div>${w.map(wireHTML).join("")}</div>`).join("")).join("")||"<div class='muted'>Noch keine Dosen.</div>"}
function switchedOutputsForHose(ds){let hasSeries=ds.find(d=>has(d,"Serienschalter"));if(hasSeries)return [{dose:hasSeries,label:"L1 geschaltet"},{dose:hasSeries,label:"L2 geschaltet"}];let chain=ds.filter(d=>has(d,"Wechselschalter")||has(d,"Kreuzschalter"));if(chain.some(d=>has(d,"Wechselschalter")))return [{dose:chain.filter(d=>has(d,"Wechselschalter")).slice(-1)[0],label:"L geschaltet"}];let sw=ds.find(d=>has(d,"Schalter"));return sw?[{dose:sw,label:"L geschaltet"}]:[]}
function renderKlemmen(){
  let p=current(), rows="", nr=1, groups={};
  p.doses.forEach(d=>{
    if(!usesLight(d.devices))return;
    let g=d.lightGroup || (d.room+" Licht");
    if(!groups[g])groups[g]={name:g, switches:[], series:[], lamps:[]};
    if(has(d,"Schalter")||has(d,"Wechselschalter")||has(d,"Kreuzschalter"))groups[g].switches.push(d);
    if(has(d,"Serienschalter"))groups[g].series.push(d);
    if(has(d,"Lampe"))groups[g].lamps.push(d);
  });
  Object.values(groups).forEach(g=>{
    if(g.series.length){
      g.series.forEach(d=>{
        rows+=`<tr><td>X${nr++}</td><td>${esc(g.name)}</td><td>${esc(d.room)}</td><td>${esc(d.name)}</td><td>L1 geschaltet</td></tr>`;
        rows+=`<tr><td>X${nr++}</td><td>${esc(g.name)}</td><td>${esc(d.room)}</td><td>${esc(d.name)}</td><td>L2 geschaltet</td></tr>`;
      });
    }else if(g.switches.length){
      let d=g.switches[g.switches.length-1];
      rows+=`<tr><td>X${nr++}</td><td>${esc(g.name)}</td><td>${esc(d.room)}</td><td>${esc(d.name)}</td><td>L geschaltet von letztem Schalter</td></tr>`;
    }
  });
  klemmenList.innerHTML=rows?`<table><tr><th>Klemme</th><th>Lichtkreis</th><th>Raum</th><th>Schalter/Dose</th><th>Funktion</th></tr>${rows}</table><h3>Gesamt: ${nr-1} Reihenklemmen</h3>`:"<div class='muted'>Keine geschalteten Leiter erkannt.</div>";
}
function renderMaterial(){let counts={},fxp={},wireCross={},net=0,total=0;current().doses.forEach(d=>d.devices.forEach(v=>counts[v]=(counts[v]||0)+1));calcAll().forEach(g=>{if(g.doses.length)fxp[g.hose.fxp]=(fxp[g.hose.fxp]||0)+1;g.calc.forEach(w=>{w.filter(x=>!x.includes("Netzwerk")).forEach(x=>{let q=x.includes("2,5")?"2,5":g.hose.cross;wireCross[q]=(wireCross[q]||0)+1;total++});if(w.some(x=>x.includes("Netzwerk")))net++})});materialList.innerHTML=`<h3>Geräte</h3>${Object.entries(counts).map(([k,v])=>`<div>${v} × ${esc(k)}</div>`).join("")||"Keine Geräte"}<h3>FXP</h3>${Object.entries(fxp).map(([k,v])=>`<div>${v} × FXP ${k}</div>`).join("")}<h3>Einzeldrähte</h3>${Object.entries(wireCross).map(([k,v])=>`<div>${v} × ${k} mm²</div>`).join("")}<div>Gesamt: ${total}</div>${net?`<div>${net} × Netzwerkkabel</div>`:""}`}
function renderGuide(){let p=current();let msg="Projekt benennen und Raum auswählen.";if(selected.type==="project")msg="Weiter: Raum hinzufügen oder bestehenden Raum links auswählen.";if(selected.type==="room")msg="Weiter: Schlauch hinzufügen oder auswählen.";if(selected.type==="hose")msg="Weiter: Dose hinzufügen.";if(selected.type==="dose")msg="Dose bearbeiten, bei Schalter/Lampe den richtigen Lichtkreis wählen und speichern.";guideBox.innerHTML=msg}
function renderAll(){let p=current();migrate(p);renderTree();renderEdit();renderCalc();renderKlemmen();renderMaterial();renderGuide();footerStats.textContent=`Räume: ${p.rooms.length} · Schläuche: ${p.hoses.length} · Dosen: ${p.doses.length}`}
ensure();renderAll();show("Edit");
</script>
